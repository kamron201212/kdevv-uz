<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страны мира</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-slate-50 min-h-screen p-6 font-sans gap-12 flex flex-col">
<div class="flex items-center justify-between w-full h-[100px]">
    <div id="searcher" class="flex items-center gap-3 w-full max-w-[400px]">
        <input type="text" id="search-input" placeholder="Поиск страны..." class="w-full p-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="mt-4 flex h-20 w-20 items-center justify-center rounded-full bg-blue-500 text-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="h-16 w-16" viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
        </svg>
    </div>
</div>
  <div id="countries-grid" class="grid grid-cols-4 gap-4 justify-center w-full h-full">
  </div>
  <!-- Контейнер для кнопок пагинации (стили Tailwind) -->
<div id="pagination-container" class="flex justify-center items-center gap-2 mt-8 mb-12">
  <!-- Кнопки с номерами страниц сгенерируются автоматически через JS -->
</div>

  <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-xl transform scale-95 transition-transform duration-300 relative flex flex-col items-center text-center">
      <button id="close-modal" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 font-bold text-xl cursor-pointer">&times;</button>
      
      <!-- Флаг внутри модалки -->
      <div id="modal-flag" class="w-full h-40 bg-cover bg-center rounded-xl border border-slate-100 mb-4"></div>
      
      <!-- Информация -->
      <h2 id="modal-name" class="text-2xl font-bold text-slate-800 mb-2">Название страны</h2>
      <p class="text-slate-600 mb-1"><strong>Столица:</strong> <span id="modal-capital">Данные</span></p>
      <p class="text-slate-600"><strong>Население:</strong> <span id="modal-pop">Данные</span></p>
    </div>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/api.js"></script>
</html>
